      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: S3Bucket is the Schema for the s3buckets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of the S3Bucket
            properties:
              bucket:
                description: Bucket is the name of the S3 bucket to create.
                minLength: 1
                type: string
              provider:
                description: |-
                  Provider selects which backend from the operator's providers file
                  fulfills this bucket. Falls back to the configured default
                  provider when empty. Changing this field is the migration cutover:
                  the operator provisions the bucket on the new backend and repoints
                  the credentials Secret - it does NOT move data (see
