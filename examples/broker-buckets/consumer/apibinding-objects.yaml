# Consumer binds the generic storage.Object API from the platform workspace.
# This API is resource-broker "backed": instances appear in the virtual workspace
# of the export, and the broker sees and routes them.
#
# The permissionClaims are what the broker needs to copy related resources (the
# result secret, events, the namespace) into the consumer workspace — a lesson
# from the GCP spike: the claims must be Accepted.
apiVersion: apis.kcp.io/v1alpha2
kind: APIBinding
metadata:
  name: objects
spec:
  reference:
    export:
      path: root:platform
      name: objects
  permissionClaims:
    - resource: secrets
      group: ""
      state: Accepted
      selector:
        matchAll: true
      verbs: ["*"]
    - resource: events
      group: ""
      state: Accepted
      selector:
        matchAll: true
      verbs: ["*"]
    - resource: namespaces
      group: ""
      state: Accepted
      selector:
        matchAll: true
      verbs: ["*"]
