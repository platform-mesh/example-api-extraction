# The order: a generic bucket in region=eu.
# -> broker matches the GCP provider (AcceptAPI region valueIn:[eu])
# -> floci-gcp creates gs://bucket-from-consumer
# -> status.url appears back in the consumer workspace.
#
# Migration (the demo highlight): patch region to us ->
#   kubectl patch object bucket-from-consumer --type merge -p '{"spec":{"region":"us"}}'
# The broker creates a Migration, stages at the AWS provider, cuts over ->
# s3://bucket-from-consumer in floci-aws, the GCP copy is torn down.
apiVersion: storage.generic.platform-mesh.io/v1alpha1
kind: Object
metadata:
  name: bucket-from-consumer
spec:
  region: eu
  versioning: false
