# floci-aws emulator (S3, LocalStack-compatible: port 4566, fake creds).
# Built analogously to floci-gcp.
# VERIFY (on site): image tag (floci/floci-aws:latest?), port (4566?) and env
# prefix (FLOCI_AWS_*?) against the floci-aws docs — floci.io/aws.
apiVersion: v1
kind: Namespace
metadata:
  name: floci-aws
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: floci-aws
  namespace: floci-aws
  labels:
    app.kubernetes.io/name: floci-aws
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: floci-aws
  template:
    metadata:
      labels:
        app.kubernetes.io/name: floci-aws
    spec:
      # Same trap as floci-gcp: service links (FLOCI_AWS_PORT=tcp://...) collide
      # with the FLOCI_AWS_* env prefix -> off.
      enableServiceLinks: false
      containers:
        - name: floci-aws
          image: floci/floci-aws:latest
          ports:
            - containerPort: 4566
              name: api
          env:
            - name: FLOCI_AWS_HOSTNAME
              value: floci-aws.floci-aws.svc.cluster.local
          readinessProbe:
            # tcpSocket instead of httpGet: the floci-aws health path isn't
            # verified yet; TCP-ready is robust enough for the PoC.
            tcpSocket:
              port: 4566
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: floci-aws
  namespace: floci-aws
spec:
  selector:
    app.kubernetes.io/name: floci-aws
  ports:
    - name: api
      port: 4566
      targetPort: 4566
