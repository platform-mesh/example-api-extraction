# floci-gcp emulator (mock mode, no Docker socket).
# Taken from a verified GCP emulator spike — the traps below are already solved.
apiVersion: v1
kind: Namespace
metadata:
  name: floci-gcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: floci-gcp
  namespace: floci-gcp
  labels:
    app.kubernetes.io/name: floci-gcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: floci-gcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: floci-gcp
    spec:
      # Trap #1: kubelet service links (FLOCI_GCP_PORT=tcp://...) collide with
      # the FLOCI_GCP_* env prefix of Quarkus -> crash on startup.
      enableServiceLinks: false
      containers:
        - name: floci-gcp
          image: floci/floci-gcp:latest
          ports:
            - containerPort: 4588
              name: api
          env:
            - name: FLOCI_GCP_HOSTNAME
              value: floci-gcp.floci-gcp.svc.cluster.local
            - name: FLOCI_GCP_BASE_URL
              value: http://floci-gcp.floci-gcp.svc.cluster.local:4588
            - name: FLOCI_GCP_STORAGE_MODE
              value: memory
          readinessProbe:
            # Trap #2: no /q/health in the image (404); the storage endpoint
            # answers 200.
            httpGet:
              path: /storage/v1/b?project=test-project
              port: 4588
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: floci-gcp
  namespace: floci-gcp
spec:
  selector:
    app.kubernetes.io/name: floci-gcp
  ports:
    - name: api
      port: 4588
      targetPort: 4588
