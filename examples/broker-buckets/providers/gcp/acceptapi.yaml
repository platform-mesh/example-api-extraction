# AcceptAPI: the GCP provider declares that it serves storage.Object orders with
# region=eu. Created in the GCP provider workspace (root:providers:gcp); the
# broker sees it through the virtual workspace of the AcceptAPI export.
#
# apiExportName references the APIExport IN the provider workspace under which the
# api-syncagent publishes the kro-generated Object CRD (see
# publishedresource-objects.yaml). The broker verifies that this export is
# bindable and binds it in its staging workspaces.
apiVersion: broker.platform-mesh.io/v1alpha1
kind: AcceptAPI
metadata:
  name: objects.storage.generic.platform-mesh.io
spec:
  apiExportName: objects
  filters:
    - key: region
      valueIn: [eu]
  gvr:
    group: storage.generic.platform-mesh.io
    resource: objects
    version: v1alpha1
