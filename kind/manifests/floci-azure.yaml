# floci-az emulator (Azure: Blob REST :4577, Event Hubs AMQP :5672, Service Bus :5673).
# The well-known devstoreaccount1 connection string works against :4577, plain HTTP.
apiVersion: v1
kind: Namespace
metadata:
  name: floci-az
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: floci-az
  namespace: floci-az
  labels:
    app.kubernetes.io/name: floci-az
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: floci-az
  template:
    metadata:
      labels:
        app.kubernetes.io/name: floci-az
    spec:
      # Keep service links off for parity with floci-gcp (Quarkus env-prefix trap);
      # floci-az needs no FLOCI_AWS_* env, so nothing collides here in practice.
      enableServiceLinks: false
      containers:
        - name: floci-az
          image: floci/floci-az:latest
          ports:
            - containerPort: 4577
              name: api
            - containerPort: 5672
              name: event-amqp
            - containerPort: 5673
              name: svc-amqp
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: floci-az
  namespace: floci-az
spec:
  selector:
    app.kubernetes.io/name: floci-az
  ports:
    - name: api
      port: 4577
      targetPort: 4577
    - name: event-amqp
      port: 5672
      targetPort: 5672
    - name: service-amqp
      port: 5673
      targetPort: 5673
