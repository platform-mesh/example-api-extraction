# floci-az emulator (Azure Blob Storage compatible: port 4577, plain HTTP).
# The Job in the RGD talks to floci-az directly via az-cli connection string,
# no TLS needed — plain HTTP to a cluster-internal service, same pattern as
# floci-aws (port 4566) and floci-gcp (port 4588).
apiVersion: v1
kind: Namespace
metadata:
  name: floci-azure
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: floci-azure
  namespace: floci-azure
  labels:
    app.kubernetes.io/name: floci-azure
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: floci-azure
  template:
    metadata:
      labels:
        app.kubernetes.io/name: floci-azure
    spec:
      # Prevent kubelet service-link env vars from colliding with FLOCI_AZ_* prefix.
      enableServiceLinks: false
      containers:
        - name: floci-azure
          image: floci/floci-az:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: FLOCI_AZ_TLS_ENABLED
              value: "false"
            - name: FLOCI_AZ_HOSTNAME
              value: floci-azure.floci-azure.svc.cluster.local
          ports:
            - name: azure
              containerPort: 4577
          readinessProbe:
            tcpSocket:
              port: azure
            initialDelaySeconds: 2
            periodSeconds: 2
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: floci-azure
  namespace: floci-azure
spec:
  selector:
    app.kubernetes.io/name: floci-azure
  ports:
    - name: azure
      port: 4577
      targetPort: azure
