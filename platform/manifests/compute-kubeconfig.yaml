# The default kubeconfig for the broker points to kcp; this is the
# kubeconfig for the "compute" cluster where migrations/staging resources are
# deployed. In this single-cluster demo it points back at the same cluster the
# broker pod runs in (in-cluster API + ServiceAccount token).
# Copied from github.com/platform-mesh/platform-mesh
# operators/resource-broker/examples/broker-postgres/platform/broker/compute-kubeconfig.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: compute-kubeconfig
  namespace: resource-broker-system
data:
  kubeconfig: |
    apiVersion: v1
    kind: Config
    clusters:
      - name: in-cluster
        cluster:
          server: https://kubernetes.default.svc
          certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    users:
      - name: in-cluster
        user:
          tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    contexts:
      - name: in-cluster
        context:
          cluster: in-cluster
          user: in-cluster
    current-context: in-cluster
