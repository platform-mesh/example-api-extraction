# TEMPLATE — copy to aso-controller-settings.secret.yaml and fill in real values.
#
# azure-prod provisions against REAL Azure (ASO drives Azure ARM; there is no ARM
# emulator in this repo — floci-az is data-plane only). The real secret file is
# gitignored and setup.bash FAILS if it is missing: there is no fake fallback.
#
#   1. Create an Azure AD service principal with Contributor on the target
#      subscription:
#        az ad sp create-for-rbac -n aso-example-api --role Contributor \
#          --scopes /subscriptions/<SUBSCRIPTION_ID>
#   2. Copy this file:
#        cp aso-controller-settings.secret.example.yaml aso-controller-settings.secret.yaml
#   3. Fill the four values below from the sp output (appId=CLIENT_ID,
#      password=CLIENT_SECRET, tenant=TENANT_ID) and your subscription id.
#
# This mirrors gcp-prod's clusterproviderconfig.yaml.example. Difference: gcp-prod's
# real file is committed (floci emulator values) so it works out-of-the-box; this
# real file is gitignored and required.
apiVersion: v1
kind: Secret
metadata:
  name: aso-controller-settings
  namespace: azureserviceoperator-system
stringData:
  AZURE_SUBSCRIPTION_ID: "REPLACE_WITH_YOUR_SUBSCRIPTION_ID"
  AZURE_TENANT_ID: "REPLACE_WITH_YOUR_TENANT_ID"
  AZURE_CLIENT_ID: "REPLACE_WITH_YOUR_CLIENT_ID"
  AZURE_CLIENT_SECRET: "REPLACE_WITH_YOUR_CLIENT_SECRET"
