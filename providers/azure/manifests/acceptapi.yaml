# AcceptAPI: the Azure provider serves storage.Object orders with region=ap.
# Same structure as GCP (eu) and AWS (us) — only the region filter differs.
# The broker routes ap->Azure and migrates on region change.
apiVersion: broker.platform-mesh.io/v1alpha1
kind: AcceptAPI
metadata:
  name: objects.storage.generic.platform-mesh.io
spec:
  apiExportName: objects
  filters:
    - key: region
      valueIn: [ap]
  gvr:
    group: storage.generic.platform-mesh.io
    resource: objects
    version: v1alpha1
