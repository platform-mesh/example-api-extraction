# AcceptAPI: the Azure provider serves storage.Object orders with region=eu.
# Same structure as the GCP (eu) and AWS (us) providers — only a different filter.
# The broker routes eu->Azure and migrates on region change.
apiVersion: broker.platform-mesh.io/v1alpha1
kind: AcceptAPI
metadata:
  name: objects.storage.generic.platform-mesh.io
spec:
  apiExportName: objects
  filters:
    - key: region
      valueIn: [eu]
  gvr:
    group: storage.generic.platform-mesh.io
    resource: objects
    version: v1alpha1
