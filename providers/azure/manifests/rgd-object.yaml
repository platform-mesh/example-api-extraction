# kro ResourceGraphDefinition: Azure realization of a generic storage.Object.
# Identical structure to the GCP/AWS RGDs — only the realization target is
# floci-azure (Azurite) and a Blob Storage container is created instead of a
# GCS bucket or S3 bucket. That's the heart of the demo: ONE generic type,
# three providers each with its own RGD; the broker routes by region.
#
# LIMIT (PoC): create-only, like the GCP/AWS RGDs. See tasks/todo.md.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: objects.storage.generic.platform-mesh.io
spec:

  schema:
    group: storage.generic.platform-mesh.io
    apiVersion: v1alpha1
    kind: Object
    spec:
      region: string
      versioning: boolean
    status:
      url: https://${createContainer.metadata.annotations["spike.odc/bucket-name"]}.blob.core.windows.net
      status: ${createContainer.status.succeeded > 0 ? "Available" : "Provisioning"}
      conditions: ${createContainer.status.conditions}

  resources:

    - id: createContainer
      readyWhen:
        - ${createContainer.status.succeeded > 0}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.metadata.name}-create
          namespace: ${schema.metadata.namespace}
          annotations:
            spike.odc/bucket-name: ${schema.metadata.?annotations["syncagent.kcp.io/remote-object-name"].orValue(schema.metadata.name)}
        spec:
          backoffLimit: 6
          template:
            spec:
              restartPolicy: Never
              enableServiceLinks: false
              containers:
                - name: create-container
                  image: mcr.microsoft.com/azure-cli:2.61.0
                  env:
                    - name: CONTAINER
                      value: ${schema.metadata.?annotations["syncagent.kcp.io/remote-object-name"].orValue(schema.metadata.name)}
                    # floci-azure (Azurite) accepts the well-known devstoreaccount1 credentials.
                    - name: AZURE_STORAGE_ACCOUNT
                      value: devstoreaccount1
                    - name: AZURE_STORAGE_KEY
                      value: Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      set -eu
                      echo "creating container ${CONTAINER} in floci-azure"
                      az storage container create \
                        --name "${CONTAINER}" \
                        --connection-string "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=${AZURE_STORAGE_KEY};BlobEndpoint=http://floci-azure.floci-azure.svc.cluster.local:10000/devstoreaccount1;"
                      echo "ok"
