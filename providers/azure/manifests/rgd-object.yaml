# kro ResourceGraphDefinition: Azure realization of a generic storage.Object.
# Identical structure to the GCP/AWS RGDs — only the realization target is
# floci-azure (Azure Blob Storage compatible) instead of floci-gcp (GCS) or
# floci-aws (S3). The Job runs az-cli and creates a Blob container.
#
# LIMIT (PoC): create-only, same as GCP/AWS RGDs. See tasks/todo.md.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: objects.storage.generic.platform-mesh.io
spec:

  schema:
    group: storage.generic.platform-mesh.io
    apiVersion: v1alpha1
    kind: Object
    spec:
      region: string
      versioning: boolean
    status:
      url: '${"az://" + createContainer.metadata.annotations["spike.odc/bucket-name"]}'
      status: '${createContainer.status.succeeded > 0 ? "Available" : "Provisioning"}'
      conditions: ${createContainer.status.conditions}

  resources:

    - id: createContainer
      readyWhen:
        - ${createContainer.status.succeeded > 0}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.metadata.name}-create
          namespace: ${schema.metadata.namespace}
          annotations:
            spike.odc/bucket-name: "${schema.metadata.?annotations[\"syncagent.kcp.io/remote-object-name\"].orValue(schema.metadata.name)}"
        spec:
          backoffLimit: 6
          template:
            spec:
              restartPolicy: Never
              enableServiceLinks: false
              containers:
                - name: create-container
                  image: mcr.microsoft.com/azure-cli:2.61.0
                  env:
                    - name: CONTAINER
                      value: "${schema.metadata.?annotations[\"syncagent.kcp.io/remote-object-name\"].orValue(schema.metadata.name)}"
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      set -eu
                      echo "creating container $CONTAINER in floci-azure"
                      az storage container create \
                        --name "$CONTAINER" \
                        --connection-string "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://floci-azure.floci-azure.svc.cluster.local:4577/devstoreaccount1;"
                      echo "ok"
