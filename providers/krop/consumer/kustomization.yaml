apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: consumer-ui
resources:
  - admin-rbac.yaml
helmCharts:
  - name: krop-controller
    repo: oci://ghcr.io/opendefensecloud/charts
    version: 0.1.0
    releaseName: krop-consumer
    namespace: consumer-ui
    valuesInline:
      image:
        repository: ghcr.io/ntnn/krop-controller
        tag: hackathon-2
      kcp:
        kubeconfigSecret:
          name: krop-kubeconfig
components:
  - ../hostaliases
