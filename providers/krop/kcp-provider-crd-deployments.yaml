# Stub CRD so kro's type-checker accepts apps/v1 Deployment as a host-target
# resource: kcp serves neither apps/v1 nor Pods (same reason jobs.batch needs
# kcp-provider-crd-jobs.yaml), so this schema is registered in the workspace
# purely for build-time validation. The Deployment itself is created for real
# on the host (kind) cluster by krop-controller, never inside kcp.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: deployments.apps
spec:
  group: apps
  names: {kind: Deployment, listKind: DeploymentList, plural: deployments, singular: deployment}
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources: {status: {}}
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
          properties:
            spec: {type: object, x-kubernetes-preserve-unknown-fields: true}
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                readyReplicas: {type: integer}
