# from https://github.com/opendefensecloud/krop-controller/blob/a98e23a5dfb6c05dbb53dcc75ad9296df7d56a1f/charts/krop-controller/crds/krop.opendefense.cloud_resourcegraphdefinitions.yaml
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: resourcegraphdefinitions.krop.opendefense.cloud
spec:
  group: krop.opendefense.cloud
  names:
    kind: ResourceGraphDefinition
    listKind: ResourceGraphDefinitionList
    plural: resourcegraphdefinitions
    shortNames:
    - rgd
    singular: resourcegraphdefinition
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ResourceGraphDefinition is a provider-authored blueprint. Its spec wraps kro's
          ResourceGraphDefinition spec (Schema + Resources), adding a per-resource routing
          `target` field; ToKro strips the targets back into kro's type for the builder.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ResourceGraphDefinitionSpec is kro's spec (Schema + Resources) with each
              resource carrying a routing Target. ToKro strips the targets back out.
            properties:
              resources:
                items:
                  description: |-
                    Resource wraps a kro resource with a krop routing target. All kro fields
                    (id/template/externalRef/readyWhen/includeWhen/forEach) are inlined verbatim.
                  properties:
                    externalRef:
                      description: |-
                        ExternalRef references an existing resource in the cluster instead of creating one.
                        This is useful for reading existing resources and using their values in other resources.
                        Exactly one of template or externalRef must be provided.
                      properties:
                        apiVersion:
                          description: |-
                            APIVersion is the API version of the external resource.
                            Example: "v1" for core resources, "apps/v1" for Deployments.
                          type: string
                        kind:
                          description: |-
                            Kind is the kind of the external resource.
                            Example: "Service", "ConfigMap", "Deployment".
                          type: string
                        metadata:
                          description: Metadata contains the name and optional namespace
                            of the external resource.
                          properties:
                            name:
                              description: |-
                                Name is the name of the external resource to reference.
                                Mutually exclusive with Selector.
                              minLength: 1
                              type: string
                            namespace:
                              description: |-
                                Namespace is the namespace of the external resource.
                                For single external refs (Name), defaults to the instance's namespace.
                                For external collections (Selector), empty means list across all namespaces.
                              type: string
                            selector:
                              description: |-
                                Selector is a label selector for collection external references.
                                When set, all resources matching the selector are included.
                                Mutually exclusive with Name.
                              properties:
                                matchExpressions:
                                  description: matchExpressions is a list of label
                                    selector requirements. The requirements are ANDed.
                                  items:
                                    description: |-
                                      A label selector requirement is a selector that contains values, a key, and an operator that
                                      relates the key and values.
                                    properties:
                                      key:
                                        description: key is the label key that the
                                          selector applies to.
                                        type: string
                                      operator:
                                        description: |-
                                          operator represents a key's relationship to a set of values.
                                          Valid operators are In, NotIn, Exists and DoesNotExist.
                                        type: string
                                      values:
                                        description: |-
                                          values is an array of string values. If the operator is In or NotIn,
                                          the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                          the values array must be empty. This array is replaced during a strategic
                                          merge patch.
                                        items:
                                          type: string
                                        type: array
                                        x-kubernetes-list-type: atomic
                                    required:
                                    - key
                                    - operator
                                    type: object
                                  type: array
                                  x-kubernetes-list-type: atomic
                                matchLabels:
                                  additionalProperties:
                                    type: string
                                  description: |-
                                    matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                    map is equivalent to an element of matchExpressions, whose key field is "key", the
                                    operator is "In", and the values array contains only "value". The requirements are ANDed.
                                  type: object
                              type: object
                              x-kubernetes-map-type: atomic
                          type: object
                          x-kubernetes-validations:
                          - message: exactly one of name or selector must be provided
                            rule: (has(self.name) && !has(self.selector)) || (!has(self.name)
                              && has(self.selector))
                      required:
                      - apiVersion
                      - kind
                      - metadata
                      type: object
                    forEach:
                      description: |-
                        ForEach expands this resource into a collection of resources.
                        Each entry binds a variable name to a CEL expression that evaluates to an array.
                        kro creates one resource instance for each element in the array.
                        With multiple entries, kro creates the cartesian product of all combinations.
                        Use the variable directly in template expressions (e.g., ${region}).
                        Example: [{"region": "${schema.spec.regions}"}, {"tier": "${schema.spec.tiers}"}]
                      items:
                        additionalProperties:
                          type: string
                        description: |-
                          ForEachDimension defines a single expansion axis in a forEach block.
                          Each dimension is a map with exactly one entry where the key is the variable name
                          and the value is the CEL expression. Example: {"region": "${schema.spec.regions}"}
                          Multiple dimensions create a cartesian product of expansions.
                        maxProperties: 1
                        minProperties: 1
                        type: object
                      type: array
                    id:
                      description: |-
                        ID is a unique identifier for this resource within the ResourceGraphDefinition.
                        It is used to reference this resource in CEL expressions from other resources.
                        Example: "deployment", "service", "configmap".
                      type: string
                    includeWhen:
                      description: |-
                        IncludeWhen is a list of CEL expressions that determine whether this resource should be created.
                        All expressions must evaluate to true for the resource to be included.
                        If not specified, the resource is always included.
                        Expressions may reference schema fields and/or fields in other resources in the RGD. They are
                        re-evaluated during reconciliation, so resources may be created later or
                        pruned later as conditions change.
                        Example: ["schema.spec.enableMonitoring == true", "network.status.ready == true"]
                      items:
                        type: string
                      type: array
                    readyWhen:
                      description: |-
                        ReadyWhen is a list of CEL expressions that determine when this resource is considered ready.
                        All expressions must evaluate to true for the resource to be ready.
                        If not specified, the resource is considered ready when it exists.
                        Examples:
                        - Single resource: ["database.status.phase == 'Running'", "database.status.readyReplicas > 0"]
                        - Collection: ["each.status.phase == 'Running'"]
                      items:
                        type: string
                      type: array
                    target:
                      description: 'Target routes this resource''s object(s): consumer
                        (default) | provider | host.'
                      enum:
                      - consumer
                      - provider
                      - host
                      type: string
                    template:
                      description: |-
                        Template is the Kubernetes resource manifest to create.
                        It can contain CEL expressions (using ${...} syntax) that reference other resources.
                        Exactly one of template or externalRef must be provided.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - id
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of template or externalRef must be provided
                    rule: (has(self.template) && !has(self.externalRef)) || (!has(self.template)
                      && has(self.externalRef))
                type: array
              schema:
                description: |-
                  Schema defines the structure and behavior of instances created from a ResourceGraphDefinition.
                  It specifies the API group, version, and kind for the generated CRD, along with the
                  spec and status schemas using SimpleSchema syntax. You can also define custom types,
                  validation rules, and printer columns.
                properties:
                  additionalPrinterColumns:
                    description: |-
                      AdditionalPrinterColumns defines additional printer columns
                      that will be passed down to the created CRD. If set, no
                      default printer columns will be added to the created CRD,
                      and if default printer columns need to be retained, they
                      need to be added explicitly.
                    items:
                      description: CustomResourceColumnDefinition specifies a column
                        for server side printing.
                      properties:
                        description:
                          description: description is a human readable description
                            of this column.
                          type: string
                        format:
                          description: |-
                            format is an optional OpenAPI type definition for this column. The 'name' format is applied
                            to the primary identifier column to assist in clients identifying column is the resource name.
                            See https://github.com/OAI/OpenAPI-Specification/blob/master/versions/2.0.md#data-types for details.
                          type: string
                        jsonPath:
                          description: |-
                            jsonPath is a simple JSON path (i.e. with array notation) which is evaluated against
                            each custom resource to produce the value for this column.
                          type: string
                        name:
                          description: name is a human readable name for the column.
                          type: string
                        priority:
                          description: |-
                            priority is an integer defining the relative importance of this column compared to others. Lower
                            numbers are considered higher priority. Columns that may be omitted in limited space scenarios
                            should be given a priority greater than 0.
                          format: int32
                          type: integer
                        type:
                          description: |-
                            type is an OpenAPI type definition for this column.
                            See https://github.com/OAI/OpenAPI-Specification/blob/master/versions/2.0.md#data-types for details.
                          type: string
                      required:
                      - jsonPath
                      - name
                      - type
                      type: object
                    type: array
                  apiVersion:
                    description: |-
                      APIVersion is the version identifier for the generated CRD.
                      Must follow Kubernetes versioning conventions (v1, v1alpha1, v1beta1, etc.).
                      This field is immutable after creation.
                      Example: "v1alpha1", "v1", "v2beta1"
                    pattern: ^v[0-9]+(alpha[0-9]+|beta[0-9]+)?$
                    type: string
                    x-kubernetes-validations:
                    - message: apiVersion is immutable
                      rule: self == oldSelf
                  group:
                    default: kro.run
                    description: |-
                      Group is the API group for the generated CRD. Together with APIVersion and Kind,
                      it forms the complete GVK (Group-Version-Kind) identifier.
                      If omitted, defaults to "kro.run". This field is immutable after creation.
                      Example: "mycompany.io", "databases.example.com"
                    type: string
                    x-kubernetes-validations:
                    - message: group is immutable
                      rule: self == oldSelf
                  kind:
                    description: |-
                      Kind is the name of the custom resource type that will be created.
                      This becomes the kind field of the generated CRD and must be a valid Kubernetes kind name
                      (PascalCase, starting with a capital letter). This field is immutable after creation.
                      Example: "WebApplication", "Database", "MicroService"
                    pattern: ^[A-Z][a-zA-Z0-9]{0,62}$
                    type: string
                    x-kubernetes-validations:
                    - message: kind is immutable
                      rule: self == oldSelf
                  metadata:
                    description: Metadata to apply to the generated CRD
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        description: Annotations to apply to the generated CRD
                        type: object
                      labels:
                        additionalProperties:
                          type: string
                        description: Labels to apply to the generated CRD
                        type: object
                    type: object
                  scope:
                    default: Namespaced
                    description: |-
                      Scope determines whether the generated instance CRD is Namespaced or Cluster scoped.
                      Defaults to Namespaced to preserve existing behaviour. This field is immutable after creation.
                    enum:
                    - Namespaced
                    - Cluster
                    type: string
                    x-kubernetes-validations:
                    - message: scope is immutable
                      rule: self == oldSelf
                  spec:
                    description: |-
                      Spec defines the schema for the instance's spec section using SimpleSchema syntax.
                      This becomes the OpenAPI schema for instances of the generated CRD.
                      Use SimpleSchema's concise syntax to define fields, types, defaults, and validations.
                      Example: {"replicas": "integer | default=1 | min=1 | max=10"}
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  status:
                    description: |-
                      Status defines the schema for the instance's status section using SimpleSchema syntax.
                      Unlike spec, status fields use CEL expressions to project values from underlying resources.
                      This allows you to surface important information from managed resources at the instance level.
                      Example: {"connectionName": "${database.status.connectionName}", "endpoint": "${service.status.loadBalancer.ingress[0].hostname}"}
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  types:
                    description: |-
                      Types is a map of custom type definitions that can be referenced in the Spec.
                      This allows you to define reusable complex types using SimpleSchema syntax.
                      Reference custom types in Spec using the type name.
                      Example: {"Server": {"host": "string", "port": "integer"}}
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                required:
                - apiVersion
                - kind
                - scope
                type: object
            required:
            - schema
            type: object
          status:
            description: BlueprintStatus is the observed state the Registrar writes
              back.
            properties:
              conditions:
                description: Conditions (Ready, etc.).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              exportedAPI:
                description: ExportedAPI is the metadata.name of the published APIExport.
                type: string
              identityHash:
                description: IdentityHash is the published APIExport's identity hash.
                type: string
              observedSpecHash:
                description: ObservedSpecHash is the spec hash the current publication
                  reflects.
                type: string
            type: object
        type: object
