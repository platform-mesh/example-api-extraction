# Stand-in for the Crossplane Composite Resource Definition (XRD) that
# registers gcp.opendefense.cloud/GCPBucket in provider-gcp's real
# deployment. provider-gcp itself never defines this CRD - Crossplane
# generates it from an XRD, and provider-terraform is what actually turns a
# GCPBucket into a real (or emulated) GCS bucket and writes
# status.bucketUrl back. Neither is part of this PoC.
#
# hack/run.bash's provider-gcp flow drives that missing Crossplane leg by
# hand: after provider-gcp renders a GCPBucket, it sends the derived
# bucketName/location/storageClass straight to floci-gcp and patches
# status.bucketUrl with the result - exactly what provider-terraform would
# do, minus the Terraform.
#
# Copied verbatim from ../provider-gcp/hack/config/crd/ (the sibling repo's
# own validation harness, see its README "Validating against floci-gcp").
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gcpbuckets.gcp.opendefense.cloud
spec:
  group: gcp.opendefense.cloud
  names:
    kind: GCPBucket
    listKind: GCPBucketList
    plural: gcpbuckets
    singular: gcpbucket
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                bucketName:
                  type: string
                location:
                  type: string
                storageClass:
                  type: string
            status:
              type: object
              properties:
                bucketUrl:
                  type: string
